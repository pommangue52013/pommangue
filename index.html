<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Receipt Style Github Page</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#d8d8d8;
    font-family:"Courier New", monospace;
    overflow-x:hidden;
    min-height:100vh;
    transition:0.3s;
}

/* background layer */

.bg{
    position:fixed;
    inset:0;
    background-size:cover;
    background-position:center;
    filter:blur(5px) brightness(0.9);
    transform:scale(1.05);
    z-index:-1;
}

/* top nav */

.nav{
    width:100%;
    padding:20px;
    display:flex;
    justify-content:center;
    gap:14px;
    position:sticky;
    top:0;
    z-index:100;
}

.nav button{
    border:none;
    background:#f7f7f7;
    padding:12px 20px;
    border-radius:4px;
    cursor:pointer;
    font-family:"Courier New", monospace;
    font-size:14px;
    box-shadow:0 2px 8px rgba(0,0,0,0.12);
    transition:0.2s;
}

.nav button:hover{
    transform:translateY(-2px);
    background:white;
}

/* upload button */

.upload-label{
    position:relative;
    overflow:hidden;
}

.upload-label input{
    position:absolute;
    inset:0;
    opacity:0;
    cursor:pointer;
}

/* receipt */

.receipt{
    width:360px;
    max-width:92%;
    margin:20px auto 80px;
    background:#fdfdfd;
    padding:26px;
    box-shadow:
    0 0 0 1px rgba(0,0,0,0.08),
    0 12px 40px rgba(0,0,0,0.15);

    position:relative;
}

/* torn edges */

.receipt::before,
.receipt::after{
    content:"";
    position:absolute;
    left:0;
    width:100%;
    height:14px;
    background:
    radial-gradient(circle at 10px -2px, transparent 12px, #fdfdfd 13px);
    background-size:20px 20px;
}

.receipt::before{
    top:-14px;
}

.receipt::after{
    bottom:-14px;
    transform:rotate(180deg);
}

/* title */

.logo{
    font-size:34px;
    font-weight:bold;
    letter-spacing:-2px;
    margin-bottom:8px;
}

.info{
    font-size:14px;
    line-height:1.7;
    margin-bottom:26px;
}

.center{
    text-align:center;
}

.line{
    border-top:2px dashed #444;
    margin:18px 0;
}

/* posts */

.posts{
    display:flex;
    flex-direction:column;
    gap:16px;
}

.post{
    padding-bottom:16px;
    border-bottom:1px dashed #888;
}

.post-title{
    font-size:18px;
    margin-bottom:10px;
    font-weight:bold;
}

.post-content{
    font-size:14px;
    line-height:1.7;
    color:#333;
}

/* buttons */

.actions{
    margin-top:24px;
    display:flex;
    gap:10px;
}

.actions button{
    flex:1;
    border:none;
    padding:12px;
    background:#111;
    color:white;
    cursor:pointer;
    font-family:"Courier New", monospace;
}

/* popup */

.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.popup-box{
    width:420px;
    max-width:92%;
    background:white;
    padding:24px;
    border-radius:10px;
}

.popup-box h2{
    margin-bottom:18px;
}

.popup-box input,
.popup-box textarea{
    width:100%;
    padding:12px;
    margin-bottom:14px;
    border:1px solid #ccc;
    font-family:"Courier New", monospace;
}

.popup-box textarea{
    height:140px;
    resize:none;
}

.popup-buttons{
    display:flex;
    gap:10px;
}

.popup-buttons button{
    flex:1;
    padding:12px;
    border:none;
    cursor:pointer;
    font-family:"Courier New", monospace;
}

.save{
    background:#111;
    color:white;
}

.cancel{
    background:#ececec;
}

/* footer */

.footer{
    text-align:center;
    margin-top:24px;
    font-size:13px;
    color:#444;
}

</style>
</head>

<body>

<!-- background -->

<div class="bg" id="bg"
style="background-image:url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1974&auto=format&fit=crop')">
</div>

<!-- nav -->

<div class="nav">

    <button onclick="location.href='index.html'">
        HOME
    </button>

    <button onclick="history.back()">
        BACK
    </button>

    <button onclick="history.forward()">
        NEXT
    </button>

    <button onclick="openPopup()">
        NEW POST
    </button>

    <label class="upload-label">
        <button>
            CHANGE BG
        </button>

        <input type="file" accept="image/*" onchange="changeBG(event)">
    </label>

</div>

<!-- receipt -->

<div class="receipt">

    <div class="logo">
        RECEIPT.
    </div>

    <div class="info">
        github.io page<br>
        personal edit archive<br>
        internet district 404
    </div>

    <div class="center">
        █████████
    </div>

    <div class="line"></div>

    <!-- posts -->

    <div class="posts" id="posts">

        <div class="post">

            <div class="post-title">
                FIRST ENTRY
            </div>

            <div class="post-content">
                Đây là bài viết đầu tiên của bạn.
                Bạn có thể thêm bài viết mới bằng nút NEW POST phía trên.
            </div>

        </div>

    </div>

    <div class="line"></div>

    <div class="footer">
        thank you for visiting.
    </div>

</div>

<!-- popup -->

<div class="popup" id="popup">

    <div class="popup-box">

        <h2>NEW POST</h2>

        <input
        type="text"
        id="title"
        placeholder="Title">

        <textarea
        id="content"
        placeholder="Write something..."></textarea>

        <div class="popup-buttons">

            <button
            class="save"
            onclick="addPost()">
            SAVE
            </button>

            <button
            class="cancel"
            onclick="closePopup()">
            CANCEL
            </button>

        </div>

    </div>

</div>

<script>

/* popup */

function openPopup(){
    document.getElementById("popup").style.display="flex";
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

/* add post */

function addPost(){

    const title =
    document.getElementById("title").value;

    const content =
    document.getElementById("content").value;

    if(title.trim()==="" || content.trim()===""){
        alert("Please fill everything.");
        return;
    }

    const post = document.createElement("div");

    post.className="post";

    post.innerHTML=`
        <div class="post-title">${title}</div>
        <div class="post-content">${content}</div>
    `;

    document.getElementById("posts")
    .prepend(post);

    document.getElementById("title").value="";
    document.getElementById("content").value="";

    closePopup();
}

/* change background */

function changeBG(event){

    const file = event.target.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(e){

            document.getElementById("bg")
            .style.backgroundImage =
            `url('${e.target.result}')`;

        };

        reader.readAsDataURL(file);
    }
}

</script>

</body>
</html>
